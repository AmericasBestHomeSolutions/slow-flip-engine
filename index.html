<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lonchando — Lead Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--s1:#111;--s2:#161616;--s3:#1d1d1d;
  --b:#222;--b2:#2c2c2c;
  --a:#c8f542;--a2:#f5a623;--a3:#42c8f5;--a4:#b842f5;
  --t:#efefef;--m:#444;--m2:#777;
  --danger:#f54242;--ok:#42f587;--warn:#f5d442;
}
body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;font-size:13px}
.app{min-height:100vh}

/* HEADER */
.hdr{background:rgba(10,10,10,.98);border-bottom:1px solid var(--b);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--a);line-height:1}
.logo small{display:block;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--m2);margin-top:2px}
.badge{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;padding:4px 9px;border:1px solid var(--a);color:var(--a)}

/* STATS BAR */
.sbar{display:flex;overflow-x:auto;background:var(--s1);border-bottom:1px solid var(--b)}
.sp{padding:9px 16px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--m2);border-right:1px solid var(--b);white-space:nowrap;flex-shrink:0}
.sp strong{display:block;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--t)}
.sp.hot strong{color:var(--a)}
.sp.warm strong{color:var(--a2)}
.sp.ws strong{color:var(--a3)}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 85px)}
.sidebar{width:270px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--b);padding:18px;overflow-y:auto}
.main{flex:1;padding:18px;overflow-x:auto}

/* SECTION LABEL */
.sl{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--m2);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sl::after{content:'';flex:1;height:1px;background:var(--b)}

/* SCENARIO TOGGLE */
.scen-toggle{display:flex;gap:2px;margin-bottom:14px}
.scen-btn{flex:1;padding:6px 3px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.5px;border:1px solid var(--b);background:none;color:var(--m2);cursor:pointer;text-align:center;line-height:1.5;transition:all .15s}
.scen-btn.active{background:var(--s3)}

/* FORMULA CARD */
.fcard{background:var(--s2);border:1px solid var(--b);padding:12px;margin-bottom:14px}
.fr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--b);font-size:11px}
.fr:last-child{border-bottom:none}
.fr span:first-child{font-family:'DM Mono',monospace;font-size:9px;color:var(--m2)}
.fr span:last-child{font-family:'DM Mono',monospace;font-size:9px;color:var(--t)}
.fr.hl span{color:var(--a)!important}
.fr.ws span{color:var(--a3)!important}

/* BUYBOX */
.bbox{background:var(--s2);border:1px solid var(--b);padding:12px;margin-bottom:10px}
.mktags{display:flex;flex-wrap:wrap;gap:3px;margin-top:8px}
.mktag{font-family:'DM Mono',monospace;font-size:7px;padding:2px 6px;border:1px solid var(--a3);color:var(--a3);letter-spacing:.5px;text-transform:uppercase}

/* IMPORT */
.itabs{display:flex;gap:2px;margin-bottom:8px}
.itab{flex:1;padding:6px 3px;font-family:'DM Mono',monospace;font-size:8px;border:1px solid var(--b);background:none;color:var(--m2);cursor:pointer;text-transform:uppercase;text-align:center;transition:all .15s}
.itab.active{background:var(--s3);border-color:var(--a3);color:var(--a3)}
textarea{width:100%;background:var(--bg);border:1px solid var(--b);color:var(--t);padding:9px;font-family:'DM Mono',monospace;font-size:9px;resize:vertical;min-height:90px;outline:none;line-height:1.6;margin-bottom:4px}
textarea:focus{border-color:var(--a)}
.hint{font-family:'DM Mono',monospace;font-size:7px;color:var(--m2);line-height:1.7}
.ibtn{width:100%;padding:9px;border:none;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;cursor:pointer;transition:all .15s;margin-top:6px}
.ibtn.blue{background:var(--a3);color:#000}
.ibtn.blue:hover{background:#5dd6ff}
.ibtn.green{background:var(--a);color:#000}
.ibtn.green:hover{background:#d9ff55}
.ibtn:disabled{background:var(--b);color:var(--m);cursor:not-allowed}
.copy-sm{width:100%;padding:6px;background:none;border:1px solid var(--b);color:var(--m2);font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;cursor:pointer;text-transform:uppercase;margin-top:6px}
.copy-sm:hover{border-color:var(--a);color:var(--a)}

/* FILTERS */
.frow{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.fsel{background:var(--s1);border:1px solid var(--b);color:var(--t);padding:6px 9px;font-family:'DM Mono',monospace;font-size:9px;outline:none;cursor:pointer;-webkit-appearance:none}
.finput{background:var(--s1);border:1px solid var(--b);color:var(--t);padding:6px 10px;font-family:'DM Mono',monospace;font-size:9px;outline:none;flex:1;min-width:120px}
.finput::placeholder{color:var(--m)}
.clr{padding:6px 10px;border:1px solid var(--b);background:none;color:var(--m2);font-family:'DM Mono',monospace;font-size:8px;cursor:pointer}
.clr:hover{border-color:var(--danger);color:var(--danger)}

/* PROGRESS */
.pbar{height:2px;background:var(--b);margin-bottom:10px;overflow:hidden}
.pfill{height:100%;background:var(--a);transition:width .3s}

/* TABLE */
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:1100px}
th{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--m2);text-transform:uppercase;padding:8px 10px;border-bottom:1px solid var(--b);text-align:left;background:var(--s2);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--a)}
td{padding:9px 10px;border-bottom:1px solid var(--b);vertical-align:middle;white-space:nowrap}
tr:hover td{background:rgba(255,255,255,.015)}
tr.rej td{opacity:.3}
.score-ring{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;border:2px solid;font-family:'Bebas Neue',sans-serif;font-size:14px}
.chip{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;padding:2px 6px;border:1px solid;text-transform:uppercase;display:inline-block}
.addr{font-size:12px;max-width:160px;overflow:hidden;text-overflow:ellipsis}
.sub{font-family:'DM Mono',monospace;font-size:8px;color:var(--m2);margin-top:1px}
.big{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.5px}
.mono{font-family:'DM Mono',monospace;font-size:9px;color:var(--m2)}
.mono strong{color:var(--t);display:block;font-size:11px}
.srchip{font-family:'DM Mono',monospace;font-size:7px;padding:2px 5px;border:1px solid var(--b);color:var(--m2);text-transform:uppercase;letter-spacing:.5px}
.srchip.zillow{color:#5599ff;border-color:#1a4aaa44}
.srchip.facebook{color:#5588ff;border-color:#1877f244}
.abtn{padding:4px 7px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.5px;border:1px solid var(--b);background:none;color:var(--m2);cursor:pointer;text-transform:uppercase;transition:all .15s}
.abtn:hover{border-color:var(--a);color:var(--a)}
.abtn.del:hover{border-color:var(--danger);color:var(--danger)}
.spin{width:18px;height:18px;border:2px solid var(--b);border-top-color:var(--a);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.pulse{animation:pulse 1.3s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;backdrop-filter:blur(3px)}
.modal{position:fixed;top:0;right:0;width:400px;height:100vh;background:var(--s1);border-left:1px solid var(--b);z-index:300;overflow-y:auto;display:flex;flex-direction:column}
.mhdr{padding:16px 18px;border-bottom:1px solid var(--b);position:sticky;top:0;background:var(--s1);z-index:10;display:flex;justify-content:space-between;align-items:flex-start}
.mbody{padding:18px;flex:1}
.msec{margin-bottom:20px}
.mrow{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--b);font-size:11px}
.mrow:last-child{border-bottom:none}
.mrow span:first-child{font-family:'DM Mono',monospace;font-size:8px;color:var(--m2)}
.mrow span:last-child{font-family:'DM Mono',monospace;font-size:9px;color:var(--t);text-align:right}
.mrow.hl span{color:var(--a)!important}
.mrow.ws span{color:var(--a3)!important}
.sblock{background:var(--s2);border:1px solid var(--b);padding:12px;margin-bottom:8px}
.sbtitle{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;margin-bottom:8px}
.ai-section h4{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--a);margin:12px 0 4px}
.ai-section h4:first-child{margin-top:0}
.ai-section p,.ai-section li{font-size:12px;line-height:1.7;color:#bbb}
.ai-section ul{padding-left:14px}
.ltrbox{background:var(--bg);border:1px solid var(--b);padding:12px;margin-top:8px;font-size:11px;line-height:1.8;color:#ccc;white-space:pre-wrap;font-family:'DM Mono',monospace}
.clsbtn{background:none;border:1px solid var(--b);color:var(--m2);font-family:'DM Mono',monospace;font-size:8px;padding:4px 8px;cursor:pointer;letter-spacing:1px;flex-shrink:0}
.clsbtn:hover{border-color:var(--danger);color:var(--danger)}
@media(max-width:800px){.layout{flex-direction:column}.sidebar{width:100%;border-right:none;border-bottom:1px solid var(--b)}.modal{width:100%}}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="logo">LONCHANDO<small>LEAD ENGINE v3</small></div>
    <div class="badge">BUY BOX: MO / IL / OH · UNDER $100K</div>
  </div>
  <div class="sbar" id="statsBar"></div>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main" id="mainContent"></main>
  </div>
  <div id="modalContainer"></div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
// ⬇⬇⬇ PASTE YOUR RAILWAY URL HERE (no trailing slash). This is the ONLY line you edit. ⬇⬇⬇
const API_BASE="https://lonchando-backend-production.up.railway.app";
// ⬆⬆⬆ e.g. https://lonchando-backend-production.up.railway.app  ⬆⬆⬆

const TAX={MO:0.010,IL:0.0207,OH:0.0156};
const INS=200,BUF=100,WS_SPREAD=7500;
const SCENARIOS=[
  {id:"s1",label:"12% / 5yr",sub:"Private Money",rate:0.12,term:60,down:0,color:"#f5a623"},
  {id:"s2",label:"10% / 5yr",sub:"Alt Private",rate:0.10,term:60,down:0,color:"#42c8f5"},
  {id:"s3",label:"5% SF 10%dn",sub:"Seller Finance",rate:0.05,term:60,down:0.10,color:"#42f587"},
];
const MARKETS=["st. louis","saint louis","florissant","ferguson","hazelwood","bridgeton","maryland heights","chesterfield","ballwin","manchester","kirkwood","webster groves","maplewood","university city","clayton","creve coeur","overland","jennings","normandy","decatur","forsyth","macon","maroa","mt zion","mount zion","east st. louis","east saint louis","belleville","cahokia","collinsville","granite city","alton","edwardsville","o'fallon","fairview heights","swansea","peoria","peoria heights","east peoria","morton","washington","chillicothe","bartonville","dupo","sauget","alorton","centerville","toledo","maumee","perrysburg","sylvania","oregon","rossford","northwood","waterville","cleveland","cleveland heights","lakewood","parma","euclid","east cleveland","maple heights","garfield heights","bedford","solon","strongsville","westlake","lorain","elyria"];

// ── STATE ─────────────────────────────────────────────────────────────────────
let state={
  leads:[
    {id:1,address:"4812 Margaretta Ave",city:"St. Louis",state:"MO",price:67000,beds:3,baths:1,sqft:1100,rent:950,source:"zillow",status:"new",analysis:null,analyzing:false},
    {id:2,address:"2234 N Decatur St",city:"Decatur",state:"IL",price:42000,beds:3,baths:1,sqft:980,rent:750,source:"facebook",status:"new",analysis:null,analyzing:false},
    {id:3,address:"811 Elmwood Ave",city:"Toledo",state:"OH",price:38000,beds:3,baths:1,sqft:1050,rent:875,source:"zillow",status:"new",analysis:null,analyzing:false},
    {id:4,address:"3300 E 131st St",city:"Cleveland",state:"OH",price:29000,beds:3,baths:1,sqft:920,rent:825,source:"zillow",status:"new",analysis:null,analyzing:false},
    {id:5,address:"701 Cahokia Dr",city:"Cahokia",state:"IL",price:24000,beds:2,baths:1,sqft:780,rent:650,source:"facebook",status:"new",analysis:null,analyzing:false},
    {id:6,address:"5501 Oleatha Ave",city:"St. Louis",state:"MO",price:55000,beds:3,baths:2,sqft:1250,rent:1050,source:"zillow",status:"new",analysis:null,analyzing:false},
    {id:7,address:"9900 Olive Blvd",city:"Creve Coeur",state:"MO",price:195000,beds:4,baths:3,sqft:2200,rent:1800,source:"zillow",status:"rejected",analysis:null,analyzing:false,buyboxReason:"$195,000 outside $15k–$100k"},
  ],
  activeScen:"s1",
  importTab:"zillow",
  sortKey:"price",sortDir:"asc",
  filterVerdict:"all",filterStrat:"all",
  search:"",
  selectedId:null,
  analyzing:false,progress:0,
  offerLetter:"",genLetter:false,
};

// ── MATH ──────────────────────────────────────────────────────────────────────
function piPayment(principal,annualRate,months){
  if(!annualRate) return principal/months;
  const r=annualRate/12;
  return principal*(r*Math.pow(1+r,months))/(Math.pow(1+r,months)-1);
}
function calcScen(price,st,scen){
  const loan=price*(1-scen.down);
  const down=price*scen.down;
  const pi=piPayment(loan,scen.rate,scen.term);
  const taxMo=(price*(TAX[st]||0.015))/12;
  const total=pi+taxMo+INS+BUF;
  return{loan,down,pi,taxMo,total};
}
function maxPriceFromRent(rent,st,scen){
  for(let p=150000;p>=5000;p-=1000){
    if(calcScen(p,st,scen).total<=rent) return p;
  }
  return 0;
}
function rentAnalysis(lead,scen){
  const rent=(lead.analysis&&lead.analysis.estimatedRent)||lead.rent||0;
  if(!rent) return null;
  const c=calcScen(lead.price,lead.state,scen);
  const maxKeep=maxPriceFromRent(rent,lead.state,scen);
  const wsMAO=Math.max(0,maxKeep-WS_SPREAD);
  return{rent,pi:c.pi,taxMo:c.taxMo,total:c.total,cashFlow:rent-c.total,maxKeep,wsMAO,down:c.down};
}
function inBuyBox(lead){
  const p=lead.price||0;
  if(p<15000||p>100000) return{pass:false,r:`$${p.toLocaleString()} outside $15k–$100k`};
  const s=(lead.state||"").toUpperCase();
  if(!["MO","IL","OH"].includes(s)) return{pass:false,r:`${s} not in target states`};
  const c=(lead.city||"").toLowerCase();
  if(!MARKETS.some(m=>c.includes(m)||m.includes(c))) return{pass:false,r:`${lead.city} not in target markets`};
  return{pass:true,r:"✓ In buy box"};
}

// ── FORMATTERS ────────────────────────────────────────────────────────────────
const f$=n=>n==null?"—":"$"+Math.round(n).toLocaleString();
function scoreColor(s){return s>=80?"#42f587":s>=60?"#f5a623":"#f54242"}
function verdictColor(v){return v==="HOT"?"#42f587":v==="WARM"?"#f5a623":"#555"}
function stratColor(v){return v==="KEEP"?"#c8f542":v==="WHOLESALE"?"#42c8f5":v==="BOTH"?"#42f587":"#555"}

// ── AI ────────────────────────────────────────────────────────────────────────
async function aiAnalyze(lead){
  const prompt=`You are a slow flip real estate expert. Return ONLY raw JSON (no markdown).
Property: ${lead.address||"Unknown"}, ${lead.city}, ${lead.state}
Price: $${lead.price} | ${lead.beds}bd/${lead.baths}ba | Sqft: ${lead.sqft||"?"} | Stated Rent: $${lead.rent||"?"}/mo
Model: Acquire via private money/seller finance, resell to tenant-buyer on installment contract or wholesale to slow flip community for $5k-$10k spread.
Return: {"estimatedRent":<number>,"rentConfidence":"HIGH"|"MEDIUM"|"LOW","dealScore":<0-100>,"dealVerdict":"HOT"|"WARM"|"COLD","cashMAO":<number>,"creativeMAO":<number>,"wholesaleMAO":<number>,"tenantBuyerPrice":<number>,"tenantBuyerMonthly":<number>,"recommendedStrategy":"KEEP"|"WHOLESALE"|"BOTH"|"PASS","arv":<number>,"rehabEstimate":<number>,"marketInsights":"<2 sentences>","riskFactors":["<r1>","<r2>","<r3>"],"negotiationTips":["<t1>","<t2>"],"recommendation":"<2-3 sentences>"}`;
  const res=await fetch(API_BASE+"/api/analyze",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      address:lead.address,city:lead.city,state:lead.state,
      price:lead.price,beds:lead.beds,baths:lead.baths,sqft:lead.sqft,rent:lead.rent
    })
  });
  const data=await res.json();
  if(data.error) throw new Error(data.error);
  return data;
}

async function aiOfferLetter(lead,scen){
  const a=lead.analysis;
  const c=calcScen(lead.price,lead.state,scen);
  const prompt=`Write a professional offer letter from real estate investor to listing agent. Seller finance offer. Under 170 words. Plain text only. Sign from "The Lonchando Acquisitions Team".
Property: ${lead.address}, ${lead.city}, ${lead.state} — Listed $${(lead.price||0).toLocaleString()}
Offer: ${scen.label} | Price: ${f$(a?.creativeMAO||lead.price)} | Down: ${f$(c.down)} | Monthly: ${f$(c.pi)}/mo | Term: ${scen.term}mo | Cash backup: ${f$(a?.cashMAO)}`;
  const res=await fetch(API_BASE+"/api/offer-letter",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      address:lead.address,city:lead.city,state:lead.state,price:lead.price,
      scenarioLabel:scen.label,term:scen.term,
      offerPrice:a?.creativeMAO||lead.price,down:c.down,monthly:c.pi,cashMAO:a?.cashMAO
    })
  });
  const data=await res.json();
  if(data.error) throw new Error(data.error);
  return data.letter||"";
}

// ── PARSE CSV ─────────────────────────────────────────────────────────────────
function parseCSV(text,source){
  return text.trim().split("\n")
    .filter(l=>l.trim()&&!l.toLowerCase().startsWith("address"))
    .map((line,i)=>{
      const p=line.includes("\t")?line.split("\t"):line.split(",");
      return{
        id:Date.now()+i,
        address:(p[0]||"").trim(),city:(p[1]||"").trim(),state:(p[2]||"").trim().toUpperCase(),
        price:parseFloat((p[3]||"").replace(/[$,]/g,""))||0,
        beds:parseInt(p[4])||3,baths:parseFloat(p[5])||1,sqft:parseInt(p[6])||0,
        rent:parseFloat((p[7]||"").replace(/[$,]/g,""))||0,
        source,status:"new",analysis:null,analyzing:false,
      };
    });
}

// ── UPDATE STATE ──────────────────────────────────────────────────────────────
function upd(id,patch){
  state.leads=state.leads.map(l=>l.id===id?Object.assign({},l,patch):l);
}
function setState(patch){
  Object.assign(state,patch);
  render();
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
async function analyzeOne(id){
  const lead=state.leads.find(l=>l.id===id);
  if(!lead) return;
  upd(id,{analyzing:true});render();
  try{
    const analysis=await aiAnalyze(lead);
    upd(id,{analysis,analyzing:false,status:"analyzed"});
  }catch(e){upd(id,{analyzing:false,status:"error"});}
  render();
}

async function analyzeAll(){
  const todo=state.leads.filter(l=>l.status!=="rejected"&&!l.analysis&&!l.analyzing);
  if(!todo.length) return;
  state.analyzing=true;state.progress=0;render();
  for(let i=0;i<todo.length;i++){
    const lead=todo[i];
    upd(lead.id,{analyzing:true});render();
    try{
      const analysis=await aiAnalyze(lead);
      upd(lead.id,{analysis,analyzing:false,status:"analyzed"});
    }catch(e){upd(lead.id,{analyzing:false});}
    state.progress=Math.round(((i+1)/todo.length)*100);
    render();
  }
  state.analyzing=false;render();
}

function importLeads(){
  const ta=document.getElementById("pasteArea");
  if(!ta||!ta.value.trim()) return;
  const parsed=parseCSV(ta.value,state.importTab);
  const withBox=parsed.map(l=>{
    const chk=inBuyBox(l);
    return Object.assign({},l,{status:chk.pass?"new":"rejected",buyboxReason:chk.r});
  });
  state.leads=[...withBox,...state.leads];
  ta.value="";
  render();
}

async function genLetter(){
  const lead=state.leads.find(l=>l.id===state.selectedId);
  if(!lead||!lead.analysis) return;
  const scen=SCENARIOS.find(s=>s.id===state.activeScen);
  state.genLetter=true;state.offerLetter="";render();
  try{const letter=await aiOfferLetter(lead,scen);state.offerLetter=letter;}
  catch{state.offerLetter="Error generating letter.";}
  state.genLetter=false;render();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  renderStats();
  renderSidebar();
  renderMain();
  renderModal();
}

function renderStats(){
  const el=document.getElementById("statsBar");
  const active=state.leads.filter(l=>l.status!=="rejected");
  const hot=state.leads.filter(l=>l.analysis?.dealVerdict==="HOT").length;
  const warm=state.leads.filter(l=>l.analysis?.dealVerdict==="WARM").length;
  const ws=state.leads.filter(l=>l.analysis?.recommendedStrategy==="WHOLESALE"||l.analysis?.recommendedStrategy==="BOTH").length;
  const nw=state.leads.filter(l=>l.status==="new"&&!l.analysis).length;
  el.innerHTML=`
    <div class="sp"><strong>${active.length}</strong>Active Leads</div>
    <div class="sp"><strong>${nw}</strong>Unanalyzed</div>
    <div class="sp hot"><strong>${hot}</strong>HOT</div>
    <div class="sp warm"><strong>${warm}</strong>WARM</div>
    <div class="sp ws"><strong>${ws}</strong>Wholesale Ready</div>
    <div class="sp"><strong>${state.leads.filter(l=>l.status==="rejected").length}</strong>Rejected</div>
  `;
}

function renderSidebar(){
  const scen=SCENARIOS.find(s=>s.id===state.activeScen);
  const ex=30000;
  const c=calcScen(ex,"MO",scen);
  const nw=state.leads.filter(l=>l.status!=="rejected"&&!l.analysis&&!l.analyzing).length;

  document.getElementById("sidebar").innerHTML=`
    <div class="sl">Financing Scenario</div>
    <div class="scen-toggle">
      ${SCENARIOS.map(s=>`<button class="scen-btn${state.activeScen===s.id?" active":""}" style="${state.activeScen===s.id?`border-color:${s.color};color:${s.color}`:""}" onclick="setState({activeScen:'${s.id}'})">
        <span style="font-size:9px;letter-spacing:.5px">${s.label}</span><br><span style="font-size:7px;color:#666">${s.sub}</span>
      </button>`).join("")}
    </div>

    <div class="sl">Formula Preview ($30k)</div>
    <div class="fcard">
      ${scen.down>0?`<div class="fr"><span>Down (${(scen.down*100).toFixed(0)}%)</span><span>${f$(c.down)}</span></div>`:""}
      <div class="fr"><span>P&I / mo</span><span>${f$(c.pi)}</span></div>
      <div class="fr"><span>Taxes / mo (MO)</span><span>${f$(c.taxMo)}</span></div>
      <div class="fr"><span>Insurance / mo</span><span>$200</span></div>
      <div class="fr"><span>Buffer / mo</span><span>$100</span></div>
      <div class="fr hl"><span>Min Rent Needed</span><span>${f$(c.total)}</span></div>
      <div class="fr ws"><span>Wholesale MAO</span><span>${f$(ex-WS_SPREAD)}</span></div>
    </div>

    <div class="sl">Buy Box</div>
    <div class="bbox">
      <div class="fr"><span>Price Range</span><span style="color:var(--a)">$15k – $100k</span></div>
      <div class="fr"><span>Type</span><span style="color:var(--a)">SFR Only</span></div>
      <div class="fr"><span>WS Spread</span><span style="color:var(--a3)">$5k – $10k</span></div>
    </div>
    <div class="mktags">
      ${["St. Louis MO","Decatur IL","E. St. Louis IL","Peoria IL","Cahokia IL","Toledo OH","Cleveland OH"].map(m=>`<span class="mktag">${m}</span>`).join("")}
    </div>

    <div style="height:18px"></div>
    <div class="sl">Import Leads</div>
    <div class="itabs">
      ${["zillow","facebook","manual"].map(t=>`<button class="itab${state.importTab===t?" active":""}" onclick="setState({importTab:'${t}'})">
        ${t}
      </button>`).join("")}
    </div>
    <textarea id="pasteArea" placeholder="Address,City,State,Price,Beds,Baths,Sqft,Rent&#10;&#10;4812 Margaretta Ave,St. Louis,MO,67000,3,1,1100,950"></textarea>
    <div class="hint">Paste CSV — buy box auto-filters on import</div>
    <button class="ibtn blue" onclick="importLeads()">Import + Filter</button>

    <div style="height:10px"></div>
    ${state.analyzing?`<div class="pbar"><div class="pfill" style="width:${state.progress}%"></div></div>
    <div class="hint" style="color:var(--a)">Analyzing... ${state.progress}%</div>`:""}
    <button class="ibtn green" onclick="analyzeAll()" ${state.analyzing||nw===0?"disabled":""}>
      ${state.analyzing?`Analyzing ${state.progress}%`:`Analyze All (${nw})`}
    </button>
    <div class="hint" style="margin-top:5px">AI estimates rent, deal score, all MAOs</div>
    <button class="copy-sm" onclick="navigator.clipboard.writeText('Address,City,State,Price,Beds,Baths,Sqft,Rent')">Copy CSV Template</button>
  `;
}

function renderMain(){
  const el=document.getElementById("mainContent");
  const scen=SCENARIOS.find(s=>s.id===state.activeScen);

  // filter + sort
  let list=[...state.leads];
  if(state.filterVerdict!=="all") list=list.filter(l=>l.analysis?.dealVerdict===state.filterVerdict);
  if(state.filterStrat!=="all") list=list.filter(l=>l.analysis?.recommendedStrategy===state.filterStrat);
  if(state.search) list=list.filter(l=>(l.address+l.city+l.state).toLowerCase().includes(state.search.toLowerCase()));
  list.sort((a,b)=>{
    const ra=rentAnalysis(a,scen),rb=rentAnalysis(b,scen);
    let av=state.sortKey==="price"?a.price:state.sortKey==="score"?(a.analysis?.dealScore??-1):state.sortKey==="rent"?(a.analysis?.estimatedRent||a.rent||0):state.sortKey==="cashflow"?(ra?.cashFlow??-9999):state.sortKey==="wsmao"?(ra?.wsMAO??0):state.sortKey==="keepmao"?(ra?.maxKeep??0):0;
    let bv=state.sortKey==="price"?b.price:state.sortKey==="score"?(b.analysis?.dealScore??-1):state.sortKey==="rent"?(b.analysis?.estimatedRent||b.rent||0):state.sortKey==="cashflow"?(rb?.cashFlow??-9999):state.sortKey==="wsmao"?(rb?.wsMAO??0):state.sortKey==="keepmao"?(rb?.maxKeep??0):0;
    return state.sortDir==="desc"?bv-av:av-bv;
  });

  const rows=list.map(lead=>{
    const a=lead.analysis;
    const rej=lead.status==="rejected";
    const ra=rentAnalysis(lead,scen);
    const score=a?.dealScore;
    const rent=a?.estimatedRent||lead.rent||0;
    const rentOk=ra&&rent>=ra.total;

    return`<tr class="${rej?"rej":""}">
      <td>
        ${lead.analyzing?`<div class="spin"></div>`:
          score!=null?`<div class="score-ring" style="border-color:${scoreColor(score)};color:${scoreColor(score)}">${score}</div>`:
          `<div class="score-ring" style="border-color:var(--b);color:var(--m)">—</div>`}
      </td>
      <td>
        <div class="addr">${lead.address||"—"}</div>
        <div class="sub">${lead.city}, ${lead.state} · ${lead.beds}bd/${lead.baths}ba${lead.sqft?` · ${lead.sqft}sf`:""}</div>
        ${rej?`<div style="font-family:'DM Mono',monospace;font-size:7px;color:var(--danger);margin-top:2px">${lead.buyboxReason||""}</div>`:""}
      </td>
      <td><span class="big" style="color:${rej?"var(--m)":lead.price>70000?"var(--warn)":"var(--t)"}">${f$(lead.price)}</span></td>
      <td style="background:rgba(200,245,66,.02)">
        ${rej?"—":lead.analyzing?`<span class="pulse" style="font-family:'DM Mono',monospace;font-size:8px;color:var(--a)">Estimating...</span>`:
        rent?`<div>
          <div class="big" style="color:var(--ok);font-size:16px">${f$(rent)}/mo</div>
          ${ra?`<div class="mono" style="margin-top:2px">
            P&I ${f$(ra.pi)} · Tax ${f$(ra.taxMo)} · Ins $200 · Buf $100<br>
            <strong>Total: ${f$(ra.total)}/mo</strong> <span style="color:${rentOk?"var(--ok)":"var(--danger)"}">${rentOk?"✓ Supports":"✗ Short"}</span>
          </div>`:""}
          ${a?.rentConfidence?`<div class="mono">Conf: ${a.rentConfidence}</div>`:""}
        </div>`:"<span class='mono'>Run analysis</span>"}
      </td>
      <td style="background:rgba(200,245,66,.02)">
        ${ra&&rent?`<div class="big" style="font-size:16px;color:${ra.cashFlow>=0?"var(--ok)":"var(--danger)"}">${ra.cashFlow>=0?"+":""}${f$(ra.cashFlow)}/mo</div>
        <div class="mono">Yr: ${f$(ra.cashFlow*12)}</div>`:"—"}
      </td>
      <td style="background:rgba(66,200,245,.02)">
        ${ra&&rent?`<div class="big" style="font-size:16px;color:var(--a3)">${f$(ra.wsMAO)}</div>
        <div class="mono">Spread: ${f$(Math.max(0,ra.wsMAO-lead.price))} ${ra.wsMAO>lead.price?"✓":"✗"}</div>`:"—"}
      </td>
      <td style="background:rgba(66,245,135,.02)">
        ${ra&&rent?`<div class="big" style="font-size:16px;color:var(--a)">${f$(ra.maxKeep)}</div>
        <div class="mono">${ra.maxKeep>=lead.price?"✓ Under MAO":"⚠ Over MAO"}</div>`:"—"}
      </td>
      <td>
        ${a?.recommendedStrategy?`<span class="chip" style="border-color:${stratColor(a.recommendedStrategy)};color:${stratColor(a.recommendedStrategy)}">${a.recommendedStrategy}</span>`:
          a?.dealVerdict?`<span class="chip" style="border-color:${verdictColor(a.dealVerdict)};color:${verdictColor(a.dealVerdict)}">${a.dealVerdict}</span>`:
          `<span class="mono">—</span>`}
      </td>
      <td><span class="srchip ${lead.source}">${lead.source}</span></td>
      <td>
        <div style="display:flex;gap:3px">
          ${!rej?`<button class="abtn" onclick="setState({selectedId:${lead.id},offerLetter:''})">View</button>`:""}
          ${!rej&&!lead.analyzing&&!a?`<button class="abtn" onclick="analyzeOne(${lead.id})">Analyze</button>`:""}
          ${!rej?`<button class="abtn del" onclick="upd(${lead.id},{status:'rejected'});render()">✕</button>`:""}
        </div>
      </td>
    </tr>`;
  }).join("");

  el.innerHTML=`
    <div class="frow">
      <input class="finput" id="srch" placeholder="Search address, city..." value="${state.search}" oninput="state.search=this.value;render()">
      <select class="fsel" onchange="state.filterVerdict=this.value;render()">
        <option value="all"${state.filterVerdict==="all"?" selected":""}>All Verdicts</option>
        <option value="HOT"${state.filterVerdict==="HOT"?" selected":""}>HOT</option>
        <option value="WARM"${state.filterVerdict==="WARM"?" selected":""}>WARM</option>
        <option value="COLD"${state.filterVerdict==="COLD"?" selected":""}>COLD</option>
      </select>
      <select class="fsel" onchange="state.filterStrat=this.value;render()">
        <option value="all"${state.filterStrat==="all"?" selected":""}>All Strategies</option>
        <option value="KEEP"${state.filterStrat==="KEEP"?" selected":""}>Keep</option>
        <option value="WHOLESALE"${state.filterStrat==="WHOLESALE"?" selected":""}>Wholesale</option>
        <option value="BOTH"${state.filterStrat==="BOTH"?" selected":""}>Both</option>
        <option value="PASS"${state.filterStrat==="PASS"?" selected":""}>Pass</option>
      </select>
      <button class="clr" onclick="state.search='';state.filterVerdict='all';state.filterStrat='all';render()">Clear</button>
      <button class="abtn" onclick="toggleSort('price')">Price ${state.sortKey==="price"?state.sortDir==="asc"?"↑":"↓":"↕"}</button>
      <button class="abtn" onclick="toggleSort('score')">Score ${state.sortKey==="score"?state.sortDir==="asc"?"↑":"↓":"↕"}</button>
      <button class="abtn" onclick="toggleSort('cashflow')">Cash Flow ${state.sortKey==="cashflow"?state.sortDir==="asc"?"↑":"↓":"↕"}</button>
      <button class="abtn" onclick="toggleSort('wsmao')">WS MAO ${state.sortKey==="wsmao"?state.sortDir==="asc"?"↑":"↓":"↕"}</button>
    </div>

    <div class="twrap">
      ${list.length===0?`<div style="padding:60px;text-align:center;color:var(--m);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase">No leads match filters</div>`:`
      <table>
        <thead><tr>
          <th>Score</th><th>Address</th><th>List Price</th>
          <th style="background:rgba(200,245,66,.06)">🏠 Rent Est. / Costs</th>
          <th style="background:rgba(200,245,66,.06)">Cash Flow (${scen.label})</th>
          <th style="background:rgba(66,200,245,.04)">Wholesale MAO</th>
          <th style="background:rgba(66,245,135,.03)">Keep MAO</th>
          <th>Strategy</th><th>Source</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`}
    </div>
  `;
}

function toggleSort(k){
  if(state.sortKey===k) state.sortDir=state.sortDir==="asc"?"desc":"asc";
  else{state.sortKey=k;state.sortDir="asc";}
  render();
}

function renderModal(){
  const el=document.getElementById("modalContainer");
  if(!state.selectedId){el.innerHTML="";return;}
  const lead=state.leads.find(l=>l.id===state.selectedId);
  if(!lead){el.innerHTML="";return;}
  const a=lead.analysis;
  const scen=SCENARIOS.find(s=>s.id===state.activeScen);

  const scenBlocks=SCENARIOS.map(sc=>{
    const ra=rentAnalysis(lead,sc);
    const rent=a?.estimatedRent||lead.rent||0;
    if(!rent) return`<div class="sblock"><div class="sbtitle" style="color:${sc.color}">${sc.label} <small style="font-size:9px;color:#666">${sc.sub}</small></div><div class="mono">Run analysis to see rent estimate</div></div>`;
    return`<div class="sblock">
      <div class="sbtitle" style="color:${sc.color}">${sc.label} <small style="font-size:9px;color:#666">${sc.sub}</small></div>
      ${sc.down>0?`<div class="mrow"><span>Down (${(sc.down*100).toFixed(0)}%)</span><span>${f$(ra?.down)}</span></div>`:""}
      <div class="mrow"><span>P&I / mo</span><span>${f$(ra?.pi)}</span></div>
      <div class="mrow"><span>Taxes / mo</span><span>${f$(ra?.taxMo)}</span></div>
      <div class="mrow"><span>Insurance</span><span>$200</span></div>
      <div class="mrow"><span>Buffer</span><span>$100</span></div>
      <div class="mrow hl"><span>Total / mo</span><span>${f$(ra?.total)}</span></div>
      <div class="mrow hl"><span>Rent vs Cost</span><span style="color:${rent>=(ra?.total||0)?"var(--ok)":"var(--danger)"}">${f$(rent)} ${rent>=(ra?.total||0)?"✓":"✗"}</span></div>
      <div class="mrow"><span>Cash Flow</span><span style="color:${(ra?.cashFlow||0)>=0?"var(--ok)":"var(--danger)"}">${f$(ra?.cashFlow)}/mo</span></div>
      <div class="mrow ws"><span>Wholesale MAO</span><span>${f$(ra?.wsMAO)}</span></div>
      <div class="mrow hl"><span>Keep MAO</span><span>${f$(ra?.maxKeep)}</span></div>
    </div>`;
  }).join("");

  const aiSection=a?`
    <div class="msec">
      <div class="sl">AI Deal Analysis</div>
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px">
        <div class="score-ring" style="width:44px;height:44px;font-size:18px;border-color:${scoreColor(a.dealScore)};color:${scoreColor(a.dealScore)}">${a.dealScore}</div>
        <div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:${verdictColor(a.dealVerdict)};letter-spacing:1px">${a.dealVerdict}</div>
          <span class="chip" style="border-color:${stratColor(a.recommendedStrategy)};color:${stratColor(a.recommendedStrategy)}">${a.recommendedStrategy}</span>
        </div>
      </div>
      <div class="mrow"><span>AI Rent Estimate</span><span>${f$(a.estimatedRent)}/mo (${a.rentConfidence})</span></div>
      <div class="mrow"><span>ARV</span><span>${f$(a.arv)}</span></div>
      <div class="mrow"><span>Rehab Est.</span><span>${f$(a.rehabEstimate)}</span></div>
      <div class="mrow"><span>Cash MAO</span><span>${f$(a.cashMAO)}</span></div>
      <div class="mrow"><span>Creative MAO</span><span>${f$(a.creativeMAO)}</span></div>
      <div class="mrow ws"><span>Wholesale MAO (AI)</span><span>${f$(a.wholesaleMAO)}</span></div>
      <div class="mrow hl"><span>TB Resale Price</span><span>${f$(a.tenantBuyerPrice)}</span></div>
      <div class="mrow hl"><span>TB Monthly</span><span>${f$(a.tenantBuyerMonthly)}/mo</span></div>
    </div>
    <div class="msec ai-section">
      <div class="sl">AI Intelligence</div>
      ${a.marketInsights?`<h4>Market</h4><p>${a.marketInsights}</p>`:""}
      ${a.riskFactors?.length?`<h4>Risks</h4><ul>${a.riskFactors.map(r=>`<li>${r}</li>`).join("")}</ul>`:""}
      ${a.negotiationTips?.length?`<h4>Negotiation</h4><ul>${a.negotiationTips.map(t=>`<li>${t}</li>`).join("")}</ul>`:""}
      ${a.recommendation?`<h4>Recommendation</h4><p>${a.recommendation}</p>`:""}
    </div>
    <div class="msec">
      <div class="sl">Offer Letter (${scen.label})</div>
      <button class="ibtn" style="background:var(--a2);color:#000" onclick="genLetter()" ${state.genLetter?"disabled":""}>
        ${state.genLetter?"Generating...":"Generate Offer Letter"}
      </button>
      ${state.offerLetter?`
        <div class="ltrbox">${state.offerLetter}</div>
        <button class="copy-sm" onclick="navigator.clipboard.writeText(document.querySelector('.ltrbox').textContent);this.textContent='✓ Copied';setTimeout(()=>this.textContent='Copy to Clipboard',2000)">Copy to Clipboard</button>
      `:""}
    </div>
  `:`
    <div class="msec" style="text-align:center;padding:30px 0">
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--m2);letter-spacing:2px;margin-bottom:14px">NO ANALYSIS YET</div>
      <button class="ibtn green" onclick="analyzeOne(${lead.id});closeModal()" style="max-width:200px;margin:0 auto">Run Analysis</button>
    </div>
  `;

  el.innerHTML=`
    <div class="overlay" onclick="closeModal()"></div>
    <div class="modal">
      <div class="mhdr">
        <div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--a)">${lead.address}</div>
          <div style="font-family:'DM Mono',monospace;font-size:8px;color:var(--m2);margin-top:3px;letter-spacing:1px">${lead.city}, ${lead.state} · Listed ${f$(lead.price)}</div>
        </div>
        <button class="clsbtn" onclick="closeModal()">✕ Close</button>
      </div>
      <div class="mbody">
        <div class="msec">
          <div class="sl">Rental Analysis — All 3 Scenarios</div>
          ${scenBlocks}
        </div>
        ${aiSection}
      </div>
    </div>
  `;
}

function closeModal(){state.selectedId=null;state.offerLetter="";render();}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
